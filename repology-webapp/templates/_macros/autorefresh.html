{%- macro autorefresh_toggler() -%}
	<p>{% if autorefresh %}<a href="{{ endpoint.url_for().cleared_query_param("autorefresh").build()? }}">Disable</a>{% else %}
		<a href="{{ endpoint.url_for().query_param("autorefresh", "1").build()? }}" rel="nofollow">Enable</a>{% endif %} autorefresh.</p>
{%- endmacro -%}

{%- macro enable_autorefresh(period) -%}
{% if autorefresh %}
	<meta http-equiv="refresh" content="{{ period }}">
	<link rel="canonical" href="{{ crate::constants::REPOLOGY_HOSTNAME }}{{ endpoint.url_for().cleared_query_param("autorefresh").build()? }}">
{% endif %}
{%- endmacro -%}
